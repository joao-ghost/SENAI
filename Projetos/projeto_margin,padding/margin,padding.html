<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1 class="foot-text">🎮 Margin e Padding — Estilo Gamer</h1>
    </header>

    <main>
        <p>🎯 Padding: 30px — espaço interno</p>
        <p>O escudo azul cresceu para dentro.</p>
    </main>

    <footer>
        <p>⚔️ Margin: 30px — espaço externo</p>
        <p>O bloco verde se afastou dos outros.</p>
    </footer>
    
    <form>
        <p>🔥 Margin: 20px + Padding: 20px</p>
        <p>Margin afasta por fora. Padding cresce por dentro.</p>
    </form>
</body>
</html>
